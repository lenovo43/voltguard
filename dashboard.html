<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoltGuard AI | Mobile Alert System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --accent: #58a6ff;
        --danger: #ff3e3e;
        --success: #238636;
        --border: #30363d;
        --text: #c9d1d9;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      /* Ambulance Visual Flash */
      body.siren-active {
        animation: ambulance-flash 0.6s infinite;
      }
      @keyframes ambulance-flash {
        0% {
          background-color: #0d1117;
        }
        25% {
          background-color: #000066;
        }
        50% {
          background-color: #0d1117;
        }
        75% {
          background-color: #660000;
        }
        100% {
          background-color: #0d1117;
        }
      }

      .container {
        width: 100%;
        max-width: 1000px;
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 20px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        padding: 25px;
        border-radius: 16px;
        position: relative;
      }
      .full-width {
        grid-column: 1 / span 2;
      }

      .status-banner {
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-weight: bold;
        background: #21262d;
        border: 1px solid var(--border);
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .status-on {
        background: var(--danger) !important;
        color: white;
        box-shadow: 0 0 20px var(--danger);
      }

      .device-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        background: #21262d;
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 10px;
        transition: 0.2s;
      }

      .toggle {
        width: 50px;
        height: 26px;
        background: #484f58;
        border-radius: 15px;
        cursor: pointer;
        position: relative;
        transition: 0.3s;
        border: none;
      }
      .toggle.on {
        background: var(--success);
      }
      .toggle::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: 0.3s;
      }
      .toggle.on::after {
        transform: translateX(24px);
      }

      .amp-display {
        font-size: 4rem;
        font-weight: 900;
        color: var(--accent);
        font-family: monospace;
      }

      .log-container {
        background: #000;
        border: 1px solid var(--border);
        height: 130px;
        overflow-y: auto;
        padding: 15px;
        border-radius: 10px;
        font-family: "Courier New", monospace;
        font-size: 0.85rem;
        color: #8b949e;
      }
      .log-entry {
        margin-bottom: 5px;
        border-left: 3px solid var(--accent);
        padding-left: 10px;
      }
      .log-entry.alert {
        border-color: var(--danger);
        color: #ff7b72;
      }

      .notif-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container" id="main-ui">
      <div class="card">
        <button
          id="enable-notif"
          class="notif-btn"
          onclick="requestMobilePermission()"
        >
          📲 Enable Mobile Alerts
        </button>
        <div id="status-box" class="status-banner">Monitoring Normal</div>
        <div id="device-list"></div>
      </div>

      <div class="card" style="text-align: center">
        <div class="amp-display" id="total-amps">0.00 A</div>
        <div style="color: #8b949e; font-size: 0.9rem; margin-bottom: 20px">
          SYSTEM LOAD (LIMIT: 25A)
        </div>
        <div style="height: 200px"><canvas id="loadChart"></canvas></div>
      </div>

      <div class="card full-width">
        <h4 style="margin-top: 0; color: var(--accent)">Emergency Event Log</h4>
        <div class="log-container" id="event-log"></div>
      </div>
    </div>

    <script>
      const LIMIT = 25.0;
      let systemLocked = false;
      let audioCtx = null;

      const appliances = [
        { id: 0, name: "Air Conditioner", amps: 15.0, on: false },
        { id: 1, name: "Washing Machine", amps: 12.0, on: false },
        { id: 2, name: "Refrigerator", amps: 2.5, on: false },
        { id: 3, name: "Microwave Oven", amps: 8.0, on: false },
      ];

      // 1. Mobile Permission Request
      async function requestMobilePermission() {
        if (!("Notification" in window)) {
          alert("This browser does not support notifications.");
          return;
        }
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
          document.getElementById("enable-notif").style.display = "none";
          addLog("Mobile Notifications: ENABLED ✅");
        }
      }

      // 2. Trigger Notification
      function sendPushAlert(deviceName, currentLoad) {
        if (Notification.permission === "granted") {
          new Notification("🚨 VoltGuard: OVERLOAD", {
            body: `ALERT: ${deviceName} was cut off at ${currentLoad.toFixed(1)}A.`,
            icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png",
          });
        }
      }

      // Chart.js
      const ctx = document.getElementById("loadChart").getContext("2d");
      const chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: Array(20).fill(""),
          datasets: [
            {
              data: Array(20).fill(0),
              borderColor: "#58a6ff",
              tension: 0.4,
              pointRadius: 0,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: { y: { min: 0, max: 40, display: false } },
          plugins: { legend: { display: false } },
        },
      });

      function render() {
        const list = document.getElementById("device-list");
        list.innerHTML = "";
        appliances.forEach((a) => {
          list.innerHTML += `
                <div class="device-item" id="item-${a.id}">
                    <span>${a.name} (${a.amps}A)</span>
                    <button class="toggle ${a.on ? "on" : ""} ${systemLocked ? "disabled" : ""}" onclick="handleToggle(${a.id})"></button>
                </div>`;
        });
      }

      function handleToggle(id) {
        if (systemLocked) return;
        const app = appliances.find((x) => x.id === id);
        app.on = !app.on;
        render();
        updateLoad(id);
      }

      function updateLoad(lastId) {
        let total = appliances.reduce((sum, a) => sum + (a.on ? a.amps : 0), 0);
        if (total > LIMIT) {
          triggerSystemTrip(lastId, total);
        } else {
          refreshDisplay(total);
        }
      }

      function triggerSystemTrip(offenderId, currentVal) {
        systemLocked = true;
        const offender = appliances.find((x) => x.id === offenderId);
        offender.on = false;

        document.body.classList.add("siren-active");
        document.getElementById("status-box").classList.add("status-on");
        document.getElementById("status-box").innerText =
          "🚑 AMBULANCE SIREN ACTIVE 🚑";

        addLog(`MOBILE ALERT SENT: Overload by ${offender.name}.`, true);

        // EXECUTE MOBILE PUSH & SOUND
        sendPushAlert(offender.name, currentVal);
        playAmbulanceSiren();

        setTimeout(() => {
          systemLocked = false;
          document.body.classList.remove("siren-active");
          document.getElementById("status-box").classList.remove("status-on");
          document.getElementById("status-box").innerText = "Monitoring Normal";
          render();
          refreshDisplay(
            appliances.reduce((sum, a) => sum + (a.on ? a.amps : 0), 0),
          );
        }, 5000);
      }

      function playAmbulanceSiren() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(400, now);
        for (let i = 0; i < 5; i += 1.5) {
          osc.frequency.exponentialRampToValueAtTime(1200, now + i + 0.75);
          osc.frequency.exponentialRampToValueAtTime(400, now + i + 1.5);
        }
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.1, now + 0.1);
        gain.gain.setValueAtTime(0.1, now + 4.8);
        gain.gain.linearRampToValueAtTime(0, now + 5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 5);
      }

      function addLog(message, isAlert = false) {
        const log = document.getElementById("event-log");
        const entry = document.createElement("div");
        entry.className = `log-entry ${isAlert ? "alert" : ""}`;
        entry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
        log.prepend(entry);
      }

      function refreshDisplay(val) {
        document.getElementById("total-amps").innerText = val.toFixed(2) + " A";
        chart.data.datasets[0].data.shift();
        chart.data.datasets[0].data.push(val);
        chart.update("none");
      }

      setInterval(() => {
        if (!systemLocked)
          refreshDisplay(
            appliances.reduce((sum, a) => sum + (a.on ? a.amps : 0), 0) +
              Math.random() * 0.1,
          );
      }, 1000);
      render();
    </script>
  </body>
</html>
